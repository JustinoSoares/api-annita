<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #f2f2f2;
    font-family: Arial, Helvetica, sans-serif;
  }
  .container {
    max-width: 600px;
    margin: 30px auto;
    background-color: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .header {
    background-color: #2E77F7;
    text-align: center;
    padding: 40px 20px;
  }
  .header img {
    max-width: 160px;
    height: auto;
  }
  .content {
    padding: 32px 40px;
    color: #333;
  }
  .content h1 {
    font-size: 22px;
    margin: 0 0 20px 0;
    color: #172FAB;
  }
  .content p {
    font-size: 15px;
    line-height: 1.6;
    margin: 0 0 15px 0;
    color: #444;
  }
  .content strong {
    color: #172FAB;
  }
  .content .code {
    display: inline-block;
    background-color: #f0f7ff;
    border: 2px solid #59C7FA;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 6px;
    color: #172FAB;
    margin: 10px 0;
  }
  .content .btn {
    display: inline-block;
    background-color: #59C7FA;
    color: #ffffff !important;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: bold;
    margin: 10px 0;
  }
  .footer {
    text-align: center;
    font-size: 12px;
    color: #999;
    padding: 20px 30px;
    border-top: 1px solid #eee;
  }
  .footer a {
    color: #59C7FA;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="{{logoUrl}}" alt="Annita">
    </div>
    <div class="content">
      <h1>{{title}}</h1>
      {{content}}
    </div>
    <div class="footer">
      Annita &mdash; Este é um email automático, por favor não responda.
    </div>
  </div>
</body>
</html>
