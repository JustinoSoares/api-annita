spring.application.name=annita
spring.config.import=optional:file:.env[.properties]
spring.jpa.show-sql=false
spring.logging.level.root=WARN
spring.logging.level.com.example.annita=INFO

# Configurações do Banco de Dados PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/annita_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging levels
logging.level.root=WARN
logging.level.com.example.annita=INFO

# JWT Configuration
jwt.secret=${JWT_SECRET}

# Email Configuration (SMTP)
app.email.enabled=${EMAIL_ENABLED:false}
spring.mail.host=${EMAIL_HOST:}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger UI custom path
springdoc.swagger-ui.path=/docs

